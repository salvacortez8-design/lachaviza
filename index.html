<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LaChaviza - Enterprise</title>
    
    <!-- Diseño Base -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b1120; color: #f1f5f9; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; text-align: left; }
        .tab-active { background-color: #4f46e5; color: white; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4); }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-40">

    <!-- PANTALLA DE SEGURIDAD (Se quita sola pase lo que pase) -->
    <div id="boot-screen" class="fixed inset-0 bg-[#0b1120] z-[9999] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-10 h-10 border-4 border-slate-800 border-t-indigo-500 rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-black text-indigo-400 uppercase tracking-[0.4em]">Iniciando Sistema...</p>
    </div>

    <!-- HEADER -->
    <header class="bg-slate-900/90 backdrop-blur-xl border-b border-slate-800 sticky top-0 z-50 px-4 py-4 shadow-2xl flex flex-col sm:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-3 w-full sm:w-auto">
            <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg"><i data-lucide="pie-chart" class="w-5 h-5"></i></div>
            <div class="text-left"><h1 class="text-lg font-black uppercase text-white tracking-tighter">LaChaviza</h1><span class="text-[7px] font-black text-slate-500 uppercase tracking-widest block">Enterprise Pro v17</span></div>
        </div>
        <nav id="nav-tabs" class="flex bg-slate-800 p-1 rounded-xl border border-slate-700/50">
            <button onclick="switchTab('principal')" id="btn-principal" class="tab-active px-6 py-2 rounded-lg font-black text-[9px] uppercase tracking-widest transition-all">Panel</button>
            <button onclick="switchTab('fijos')" id="btn-fijos" class="px-6 py-2 rounded-lg font-black text-[9px] uppercase tracking-widest transition-all text-slate-400">Fijos</button>
            <button onclick="switchTab('historial')" id="btn-historial" class="px-6 py-2 rounded-lg font-black text-[9px] uppercase tracking-widest transition-all text-slate-400">Archivo</button>
        </nav>
    </header>

    <!-- CONTENEDOR DINÁMICO -->
    <main id="app-content" class="max-w-6xl mx-auto p-4 sm:p-6 space-y-8 fade-in"></main>

    <!-- FOOTER -->
    <footer class="fixed bottom-0 left-0 right-0 bg-slate-900/80 backdrop-blur-xl border-t border-slate-800 p-5 flex justify-between items-center px-6 sm:px-10 z-[60]">
        <div class="flex flex-col text-left">
            <span class="text-[9px] text-slate-500 uppercase font-black leading-none">LaChaviza Control</span>
            <span class="text-[7px] text-slate-600 uppercase font-bold mt-1 italic">GitHub Stable Build</span>
        </div>
        <button id="reset-btn" onclick="handleReset()" class="flex items-center gap-2 px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all text-rose-900 border border-rose-900/20 hover:text-rose-500">
            <i data-lucide="refresh-cw" class="w-3 h-3"></i><span id="reset-text">Reset System</span>
        </button>
    </footer>
